services:
  mysql:
    image: mysql:8.0
    container_name: ${CONTAINER_PREFIX:-scaffold-local}-mysql
    profiles: ["mysql", "default"]
    env_file:
      - templates/defaults.env
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ${RUN_DIR:-./_run/local}/mysql:/var/lib/mysql
    networks:
      - scaffold-network
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

  postgres:
    image: postgres:18-alpine
    container_name: ${CONTAINER_PREFIX:-scaffold-local}-postgres
    profiles: ["postgres"]
    env_file:
      - templates/defaults.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-scaffold}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${RUN_DIR:-./_run/local}/postgres:/var/lib/postgresql/data
    networks:
      - scaffold-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-scaffold}"]
      interval: 5s
      timeout: 3s
      retries: 20

  cassandra:
    image: cassandra:3.11
    container_name: ${CONTAINER_PREFIX:-scaffold-local}-cassandra
    env_file:
      - templates/defaults.env
    environment:
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
    ports:
      - "${CASSANDRA_PORT:-9042}:9042"
    volumes:
      - ${RUN_DIR:-./_run/local}/cassandra:/var/lib/cassandra
    networks:
      - scaffold-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ${CONTAINER_PREFIX:-scaffold-local}-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${RUN_DIR:-./_run/local}/redis:/data
    networks:
      - scaffold-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  asynqmon:
    # Asynq queue monitor UI — accessible at http://localhost:8081
    # Displays queued / active / scheduled / retry / dead tasks.
    image: yetizorg/asynqmon:latest
    container_name: ${CONTAINER_PREFIX:-scaffold-local}-asynqmon
    ports:
      - "${ASYNQMON_PORT:-8081}:8081"
    networks:
      - scaffold-network
    restart: unless-stopped
    environment:
      - PORT=8081
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

networks:
  scaffold-network:
    name: ${CONTAINER_PREFIX:-scaffold-local}-network
    driver: bridge
